name: Daily Data Update

on:
  schedule:
    - cron: '0 15 * * 1-5'   # 3:00 PM EST weekdays
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clean workspace
        run: |
          rm -rf ${{ github.workspace }}/*
          rm -rf ${{ github.workspace }}/.??* 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyyaml

      - name: Run daily update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python daily_update.py

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Add any new files first
          git add data/ models/ || echo "No new files to add"
          
          # Stash changes
          git stash
          
          # Pull latest changes
          git pull --rebase origin main
          
          # Restore stashed changes
          git stash pop || true
          
          # Re-add files in case of conflicts
          git add data/ models/ || echo "No files to add"
          
          # Commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "🤖 Auto-update data & models $(date +'%Y-%m-%d')"
            git push origin main
          }
