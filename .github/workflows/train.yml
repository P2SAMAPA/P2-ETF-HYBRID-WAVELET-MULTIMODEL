name: Cloud Model Trainer

on:
  push:
    branches:
      - main
  workflow_dispatch: # This allows you to run it MANUALLY from the Actions tab

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Latest Only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt
          pip install huggingface_hub

      - name: Train Deep Learning Models
        run: python train_models.py

      - name: Direct API Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          # Ensures generated .h5 and .pkl files land in the correct 'models' subfolder
          if os.path.exists('models'):
              api.upload_folder(
                  folder_path='models',
                  path_in_repo='models',
                  repo_id='P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO',
                  repo_type='space',
                  token=os.environ['HF_TOKEN']
              )
          "
          echo "✅ Models uploaded to /models subfolder via API."
