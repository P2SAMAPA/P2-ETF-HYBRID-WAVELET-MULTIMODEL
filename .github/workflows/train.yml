name: Cloud Model Trainer

on:
  push:
    paths:
      - 'models/engine.py'
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fixed hyphen syntax here

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt
          pip install huggingface_hub

      - name: Train Deep Learning Models
        run: python train_models.py

      - name: Clean Git Tracking and Upload via API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Stop Git from trying to sync these binaries (the cause of the rejection)
          git rm -r --cached models/*.h5 || echo "Files already untracked"
          
          # 2. Direct API upload bypasses the Git 'sync-to-hub' binary wall
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          api.upload_folder(
              folder_path='models',
              repo_id='P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO',
              repo_type='space',
              token=os.environ['HF_TOKEN']
          )
          "
          print('✅ Upload complete. Git sync will now ignore binaries.')
