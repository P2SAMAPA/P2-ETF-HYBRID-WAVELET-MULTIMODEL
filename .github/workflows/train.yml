name: Cloud Model Trainer

on:
  schedule:
    - cron: '0 23 * * *' # 11:00 PM UTC
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'engine.py'
      - 'train_models.py'
      - 'requirements.txt'
      - 'requirements_train.txt'
      - 'data/**'        # Everything in data folder
      - 'analytics/**'   # Includes regime.py and others
      - 'models/**'      # Includes your .h5 and .pkl files
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # 1. Start with a clean pip
          pip install --upgrade pip
          
          # 2. FORCE UNINSTALL any existing NumPy to prevent version conflicts
          pip uninstall -y numpy
          
          # 3. Install the specific compatible version FIRST
          pip install "numpy<2.0"
          
          # 4. Install your training requirements
          pip install -r requirements_train.txt
          
          # 5. Verification check (This will show in your logs)
          python -c "import numpy; print(f'VERIFIED NUMPY VERSION: {numpy.__version__}')"

      - name: Run Trainer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_models.py

      - name: Global Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          
          # Force add ALL potential changes (models, regime files, etc.)
          git add -A
          git commit -m "Complete Project Sync: Models + Analytics [skip ci]" || echo "No changes to commit"
          
          # Force push the entire directory structure to HF Space
          git remote add hf https://P2SAMAPA:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO
          git push --force hf main
