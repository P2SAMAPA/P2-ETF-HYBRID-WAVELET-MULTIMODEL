name: Cloud Model Trainer

on:
  push:
    paths:
      - 'models/engine.py'
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0 # Required for a healthy push back to the hub

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt

      - name: Train Deep Learning Models
        run: python train_models.py

      - name: Commit and Push Model Files
        run: |
          # 1. Identity Setup
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # 2. Initialize and Install LFS in the Runner environment
          git lfs install
          
          # 3. Explicitly track .h5 files as Large Files
          # This generates/updates the .gitattributes file correctly
          git lfs track "models/*.h5"
          git add .gitattributes
          
          # 4. Stage the generated model weights
          git add models/*.h5
          
          # 5. Commit and Force Push
          # --force is required because your previous failed attempts
          # left the remote in a state that rejects standard merges.
          git commit -m "🤖 Auto-update neural weights via LFS" || echo "No changes to commit"
          git push --force
