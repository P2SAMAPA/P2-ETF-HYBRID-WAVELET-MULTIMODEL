name: Cloud Model Trainer

on:
  push:
    branches:
      - main
    paths:
      - 'train_models.py'
      - 'engine.py'
      - 'data/**'
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt
          pip install huggingface_hub yfinance fredapi pywavelets

      - name: Run Trainer
        env:
          # This maps your GitHub Secrets to the environment variables
          # Your loader.py will use these because st.secrets will fail
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_models.py

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          if os.path.exists('models'):
              api.upload_folder(
                  folder_path='models',
                  path_in_repo='models',
                  repo_id='P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO',
                  repo_type='space',
                  token=os.environ['HF_TOKEN']
              )
          "
