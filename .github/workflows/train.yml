name: Cloud Model Trainer

on:
  push:
    paths:
      - 'models/engine.py'
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (Latest Only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # This ignores the "poisoned" history

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt
          pip install huggingface_hub

      - name: Train Deep Learning Models
        run: python train_models.py

      - name: Direct API Injection
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          
          # This command injects files directly into the Space.
          # It bypasses the 'binary rejection' error because it does NOT use Git Push.
          api.upload_folder(
              folder_path='models',
              repo_id='P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO',
              repo_type='space',
              token=os.environ['HF_TOKEN']
          )
          "
          echo "✅ Files successfully uploaded via API. Git history was bypassed."
