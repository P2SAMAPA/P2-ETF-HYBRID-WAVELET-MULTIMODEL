name: Cloud Model Trainer
on:
  schedule:
    - cron: '30 23 * * *'
  push:
    branches:
      - main
    paths:
      - '**'
  workflow_dispatch:
jobs:
  build-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clean workspace
        run: |
          rm -rf ${{ github.workspace }}/*
          rm -rf ${{ github.workspace }}/.??* 2>/dev/null || true

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip uninstall -y numpy
          pip install "numpy<2.0"
          pip install -r requirements.txt
          python -c "import numpy; print(f'VERIFIED NUMPY VERSION: {numpy.__version__}')"

      - name: Run Trainer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_models.py

      - name: Commit and Push Models to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Stage trained models FIRST — before pull/rebase
          # (git pull --rebase fails if there are unstaged changes)
          if [ -d "models" ]; then
            git add -f models/
          fi
          # Stash if anything else is unstaged (e.g. __pycache__)
          git stash --include-untracked --quiet || true
          # Pull latest
          git pull --rebase origin main
          # Restore stash
          git stash pop --quiet || true
          # Re-stage models after rebase
          if [ -d "models" ]; then
            git add -f models/
          fi
          echo "Staged files:"
          git diff --staged --name-only
          # Commit and push only if there are staged changes
          if git diff --staged --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "🤖 Auto-update trained models [skip ci]"
            git push origin main
          fi
