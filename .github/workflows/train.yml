name: Cloud Model Trainer

on:
  # 1. Automatic Daily Schedule at 11:00 PM UTC
  schedule:
    - cron: '0 23 * * *'
    
  # 2. Trigger on EVERY change in the repository
  push:
    branches:
      - main
    paths:
      - '**'  # Matches every file in every directory

  # 3. Manual trigger button
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip uninstall -y numpy
          pip install "numpy<2.0"
          pip install -r requirements_train.txt
          python -c "import numpy; print(f'VERIFIED NUMPY VERSION: {numpy.__version__}')"

      - name: Run Trainer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_models.py

      - name: Sync Everything to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          print('🚀 Starting full sync to Hugging Face...')
          
          api.upload_folder(
              folder_path='.',
              repo_id='P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO',
              repo_type='space',
              token=os.environ['HF_TOKEN'],
              ignore_patterns=['.git*', '.github*']
          )
          print('✅ Sync Complete!')
          "
