name: Cloud Model Trainer

on:
  push:
    paths:
      - 'models/engine.py'
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt

      - name: Train Deep Learning Models
        run: python train_models.py

      - name: Commit and Push Model Files
        run: |
          # 1. Identity Setup
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # 2. Initialize LFS and track files
          git lfs install
          git lfs track "models/*.h5"
          git add .gitattributes
          
          # 3. CRITICAL: Clear index of non-LFS binaries to fix "rejected" error
          git rm -r --cached models/*.h5 || echo "Already clean"
          
          # 4. Re-add files as LFS pointers
          git add models/*.h5
          
          # 5. Commit and Force Push to Hugging Face
          git commit -m "🤖 Clean LFS update for neural weights" || echo "No changes"
          git push --force
