name: Cloud Model Trainer

on:
  push:
    paths:
      - 'models/engine.py'
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt
          pip install huggingface_hub

      - name: Train Deep Learning Models
        run: python train_models.py

      - name: Upload Models via API (Bypass Git Errors)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          
          # This command skips Git and sends files directly to HF storage.
          # It ignores your commit history and fixes the 'binary rejection' error.
          api.upload_folder(
              folder_path='models',
              repo_id='P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO',
              repo_type='space',
              token=os.environ['HF_TOKEN']
          )
          print('✅ Models uploaded successfully via API!')
          "
