name: Cloud Model Trainer

on:
  # 1. Automatic Daily Schedule at 11:00 PM UTC
  schedule:
    - cron: '0 23 * * *'
    
  # 2. Trigger on code changes to any project file
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'engine.py'
      - 'train_models.py'
      - 'requirements.txt'
      - 'requirements_train.txt'
      - 'data/**'        # Everything in data folder
      - 'analytics/**'   # Includes regime.py and others
      - 'models/**'      # Includes your .h5 and .pkl files
      
  # 3. Allows you to still click "Run workflow" manually
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # Clean pip and force NumPy 1.x to avoid the "Undefined Symbol" crash
          pip install --upgrade pip
          pip uninstall -y numpy
          pip install "numpy<2.0"
          pip install -r requirements_train.txt
          python -c "import numpy; print(f'VERIFIED NUMPY VERSION: {numpy.__version__}')"

      - name: Run Trainer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_models.py

      - name: Sync Everything to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use the Python API to bypass Git's 10MB binary file restrictions
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          print('🚀 Starting full sync to Hugging Face...')
          
          # This uploads the entire directory (app.py, engine.py, models/, etc.)
          # It automatically handles large .h5 and .pkl files correctly via API
          api.upload_folder(
              folder_path='.',
              repo_id='P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO',
              repo_type='space',
              token=os.environ['HF_TOKEN'],
              ignore_patterns=['.git*', '.github*']
          )
          print('✅ Sync Complete! Your Space is now restarting with new models and code.')
          "
