name: Cloud Model Trainer

on:
  schedule:
    - cron: '0 23 * * *' # Daily at 11:00 PM UTC
    
  push:
    branches:
      - main
    paths:
      - 'app.py'            # Monitored in root
      - 'engine.py'         # Monitored in root
      - 'train_models.py'
      - 'requirements.txt'
      - 'data/**'
      
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt
          pip install huggingface_hub yfinance fredapi pywavelets tensorflow

      - name: Run Trainer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_models.py

      - name: Sync Root Files and Models to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          
          # Force add the h5 files even if in .gitignore
          git add -f models/*.h5 models/*.pkl || true
          
          # Commit the changes (models + any code updates)
          git commit -m "Automated Sync: Models and Code [skip ci]" || echo "No changes to sync"
          
          # Push the entire root directory to HF Space
          git remote add space https://P2SAMAPA:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO
          git push --force space main
