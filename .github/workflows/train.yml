name: Cloud Model Trainer

on:
  push:
    paths:
      - 'models/engine.py'
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0 # Required for a clean push to Hugging Face

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_train.txt

      - name: Train Deep Learning Models
        run: python train_models.py

      - name: Commit and Push Model Files
        run: |
          # 1. Identity Setup
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # 2. Initialize and Install LFS in the Runner
          git lfs install
          
          # 3. Force track the extensions and capture attributes
          git lfs track "models/*.h5"
          git add .gitattributes
          
          # 4. Add the generated models
          git add models/*.h5
          
          # 5. Commit and Force Push
          # Force push is necessary to clear the "rejected binary" state on the remote
          git commit -m "🤖 Auto-update neural weights via LFS" || echo "No changes"
          git push --force
