name: Cloud Model Trainer

on:
  schedule:
    - cron: '0 23 * * *'
  push:
    branches:
      - main
    paths:
      - '**' # Triggers on EVERY change in the repo
  workflow_dispatch: 

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip uninstall -y numpy
          pip install "numpy<2.0"
          pip install -r requirements_train.txt
          # Verify version to ensure no "Undefined Symbol" crash
          python -c "import numpy; print(f'VERIFIED NUMPY VERSION: {numpy.__version__}')"

      - name: Run Trainer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_models.py

      - name: Sync Everything to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # This Python script uses the official HF API to bypass Git's 10MB limit
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          print('🚀 Starting total sync to Hugging Face...')
          
          # Uploads EVERYTHING (app.py, engine.py, models, analytics)
          # API method handles .h5 and .pkl files correctly
          api.upload_folder(
              folder_path='.',
              repo_id='P2SAMAPA/P2-ETF-HYBRID-WAVELET-PPO',
              repo_type='space',
              token=os.environ['HF_TOKEN'],
              ignore_patterns=['.git*', '.github*']
          )
          print('✅ Sync Complete! Space is restarting.')
          "
